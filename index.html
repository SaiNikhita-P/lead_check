<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Tracking Demo - Page 1: Landing Page</title>
  
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18289360180"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'AW-18289360180');
  </script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 600px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { color: #1a73e8; margin-top: 0; }
    p { color: #5f6368; line-height: 1.6; }
    .banner-link {
      display: inline-block;
      margin-top: 20px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
    }
    .banner-link:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px rgba(0,0,0,0.15);
    }
    .banner-image {
      width: 100%;
      max-width: 500px;
      height: auto;
      display: block;
      border: 2px solid #e8eaed;
      border-radius: 8px;
    }
    .badge {
      background-color: #e8f0fe;
      color: #1967d2;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.85em;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Google Ads Tracking Demo</span>
    <h1>Welcome to Our Offer</h1>
    <p>Sale Upto 50% off</p>
    <p>Advertisement</p>
    
    <!-- Clicking this picture leads to Page 2 -->
    <a href="lead.html" class="banner-link" onclick="trackBannerClick()">
      <svg class="banner-image" viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg">
        <rect width="500" height="250" fill="#1a73e8" rx="8"/>
        <circle cx="400" cy="50" r="80" fill="#4285f4" opacity="0.5"/>
        <circle cx="100" cy="200" r="100" fill="#1967d2" opacity="0.3"/>
        <text x="250" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Special Exclusive Offer</text>
        <text x="250" y="150" font-family="Arial, sans-serif" font-size="18" fill="#e8f0fe" text-anchor="middle">Click Here to Claim & Submit Lead →</text>
      </svg>
    </a>
  </div>

  <script>
    // Optional: Track the click event before navigating
    function trackBannerClick() {
      gtag('event', 'banner_click', {
        'event_category': 'engagement',
        'event_label': 'hero_banner'
      });
    }
  </script>
</body>
</html>
