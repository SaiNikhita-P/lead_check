<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18289360180"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    // Initialize config with enhanced conversions enabled
    gtag('config', 'AW-18289360180', {
      'allow_enhanced_conversions': true
    });
  </script>

  <!-- CryptoJS library fallback for SHA-256 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  
  <!-- ✅ MODULAR EXTERNAL SCRIPT -->
  <script src="conversion-handler.js" defer></script>
  
  <style>
  body { 
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    background: linear-gradient(135deg, #f0f4f9 0%, #e9eef6 100%); 
    margin: 0; 
    padding: 0; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
  }

  .container { 
    max-width: 550px; 
    width: 90%; 
    background: #ffffff; 
    padding: 45px 40px; 
    border-radius: 24px; 
    box-shadow: 0 12px 24px rgba(0,0,0,0.04), 0 2px 6px rgba(0,0,0,0.04); 
  }

  /* Neat modern Top Bar navigation */
  .back-link { 
    display: inline-flex; 
    align-items: center;
    margin-bottom: 25px; 
    color: #444746; 
    text-decoration: none; 
    font-size: 0.95em; 
    font-weight: 500; 
    transition: color 0.2s;
  }
  .back-link:hover { color: #0b57d0; }

  h1 { 
    color: #1f1f1f; 
    margin: 0 0 10px 0; 
    font-size: 2em; 
    font-weight: 700;
  }
  
  p { 
    color: #444746; 
    line-height: 1.5; 
    font-size: 1em; 
    margin-bottom: 35px;
  }

  .form-group { 
    margin-bottom: 24px; 
    text-align: left; 
  }

  label { 
    display: block; 
    margin-bottom: 8px; 
    font-weight: 600; 
    color: #1f1f1f; 
    font-size: 0.9em; 
  }

  /* Sleek, Outlined Material Design inputs */
  input[type="text"], input[type="email"], input[type="tel"] { 
    width: 100%; 
    padding: 14px 16px; 
    border: 1px solid #747775; 
    border-radius: 8px; 
    box-sizing: border-box; 
    font-size: 1em; 
    transition: border-color 0.2s, box-shadow 0.2s; 
    background-color: transparent;
    color: #1f1f1f;
  }

  input:focus { 
    outline: none; 
    border-color: #0b57d0; 
    border-width: 2px;
    box-shadow: 0 0 0 3px rgba(11, 87, 208, 0.15); 
  }

  /* Rounded, glowing Google-style pill button */
  button { 
    background-color: #0b57d0; 
    color: white; 
    border: none; 
    padding: 15px 30px; 
    font-size: 1em; 
    font-weight: 600; 
    border-radius: 50px; 
    cursor: pointer; 
    width: 100%; 
    transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s; 
    box-shadow: 0 4px 12px rgba(11, 87, 208, 0.25);
    margin-top: 10px;
  }

  button:hover { 
    background-color: #0842a0; 
    box-shadow: 0 8px 16px rgba(11, 87, 208, 0.3);
    transform: translateY(-1px);
  }

  button:active {
    transform: translateY(0);
  }

  button:disabled { 
    background-color: #e1e3e1; 
    color: #8e918f;
    box-shadow: none; 
    cursor: not-allowed; 
  }

  .success-message { 
    display: none; 
    text-align: center; 
    padding: 20px; 
    background-color: #c4eed0; 
    color: #072711; 
    border-radius: 12px; 
    margin-top: 20px; 
    font-weight: 500; 
  }
</style>

</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Back to Landing Page</a>
    <h1>Subscription</h1>
    <p>Please enter your details below to avail the offer. </p>
    
    <form id="leadForm" onsubmit="handleFormSubmit(event)">
      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" required placeholder="john.doe@example.com">
      </div>
      
      <div class="form-group">
        <label for="phone">Phone Number (with Country Code) *</label>
        <input type="tel" id="phone" required placeholder="+14155552671">
      </div>

      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="John">
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Doe">
      </div>
      
      <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div id="successMessage" class="success-message">
       Thank you for submitting the form!
    </div>

  
  </div>
</body>
</html>
