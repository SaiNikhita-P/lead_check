<html lang="en">
<head>

  <style>
    /* Retain your original styles here */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f5f7fa; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 500px; width: 100%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #1a73e8; margin-top: 0; }
    p { color: #5f6368; line-height: 1.5; font-size: 0.95em; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #3c4043; font-size: 0.9em; }
    input[type="text"], input[type="email"], input[type="tel"] { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-size: 1em; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
    button { background-color: #1a73e8; color: white; border: none; padding: 14px 24px; font-size: 1em; font-weight: 600; border-radius: 6px; cursor: pointer; width: 100%; transition: background-color 0.2s; }
    button:hover { background-color: #1557b0; }
    button:disabled { background-color: #a8c7fa; cursor: not-allowed; }
    .debug-box { margin-top: 25px; padding: 15px; background-color: #f8f9fa; border: 1px solid #e8eaed; border-radius: 6px; font-family: monospace; font-size: 0.85em; color: #3c4043; word-break: break-all; display: none; }
    .success-message { display: none; text-align: center; padding: 20px; background-color: #e6f4ea; color: #137333; border-radius: 8px; margin-top: 20px; font-weight: 500; }
    .back-link { display: inline-block; margin-bottom: 15px; color: #1a73e8; text-decoration: none; font-size: 0.9em; font-weight: 500; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">← Back to Landing Page</a>
    <h1>Subscription</h1>
    <p>Please enter your details below to avail the offer. </p>
    
    <form id="leadForm" onsubmit="handleFormSubmit(event)">
      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" required placeholder="john.doe@example.com">
      </div>
      
      <div class="form-group">
        <label for="phone">Phone Number (with Country Code) *</label>
        <input type="tel" id="phone" required placeholder="+14155552671">
      </div>

      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="John">
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Doe">
      </div>
      
      <button type="submit" id="submitBtn">Submit</button>
    </form>

    <div id="successMessage" class="success-message">
       Thank you for submitting the form!
    </div>

  
  </div>
</body>
</html>
